<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Feature Delivery Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #F7F6F3;
    --surface: #FFFFFF;
    --surface2: #F0EFE9;
    --border: #E2E0D8;
    --border-light: #EDECEA;
    --text-primary: #1A1916;
    --text-secondary: #6B6960;
    --text-tertiary: #A09E97;
    --green: #0F7A5A;
    --green-bg: #E6F4EE;
    --blue: #1A5FA8;
    --blue-bg: #E6EFF9;
    --amber: #8A4E0A;
    --amber-bg: #FBF0E0;
    --gray: #4A4845;
    --gray-bg: #EDECEA;
    --accent: #2563EB;
    --radius: 8px;
    --radius-sm: 5px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
  }
  /* Header */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 18px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-left { display: flex; align-items: center; gap: 14px; }
  .logo {
    width: 32px; height: 32px;
    background: var(--text-primary);
    border-radius: 7px;
    display: flex; align-items: center; justify-content: center;
  }
  .logo svg { width: 18px; height: 18px; }
  .header-title { font-size: 15px; font-weight: 600; letter-spacing: -0.02em; }
  .header-sub { font-size: 12px; color: var(--text-secondary); margin-top: 1px; }
  .header-right { display: flex; align-items: center; gap: 12px; }
  .refresh-btn {
    display: flex; align-items: center; gap: 6px;
    font-size: 12px; font-family: 'Inter', sans-serif;
    color: var(--text-secondary);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 6px 12px;
    cursor: pointer;
    transition: background .15s;
  }
  .refresh-btn:hover { background: var(--border); }
  .refresh-btn svg { width: 13px; height: 13px; }
  .last-updated { font-size: 11px; color: var(--text-tertiary); font-family: 'JetBrains Mono', monospace; }

  /* Main layout */
  .main { max-width: 1200px; margin: 0 auto; padding: 28px 32px; }

  /* Metrics */
  .metrics { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 24px; }
  .metric-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 18px;
    cursor: pointer;
    transition: border-color .15s, box-shadow .15s;
    user-select: none;
  }
  .metric-card:hover { border-color: #B8B5AC; box-shadow: 0 2px 8px rgba(0,0,0,.06); }
  .metric-card.active { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(37,99,235,.12); }
  .metric-label { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: .06em; color: var(--text-secondary); margin-bottom: 10px; }
  .metric-value { font-size: 36px; font-weight: 600; letter-spacing: -0.04em; line-height: 1; }
  .metric-value.v-total { color: var(--text-primary); }
  .metric-value.v-done  { color: var(--green); }
  .metric-value.v-prog  { color: var(--blue); }
  .metric-value.v-pend  { color: var(--gray); }
  .metric-desc { font-size: 11px; color: var(--text-tertiary); margin-top: 6px; }

  /* Filters */
  .controls { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .filters { display: flex; gap: 6px; }
  .filter-btn {
    font-size: 12px; font-family: 'Inter', sans-serif; font-weight: 500;
    padding: 5px 14px; border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent; color: var(--text-secondary);
    cursor: pointer; transition: all .15s;
  }
  .filter-btn:hover { background: var(--surface2); }
  .filter-btn.active { background: var(--text-primary); color: #fff; border-color: transparent; }
  .feature-count { font-size: 12px; color: var(--text-tertiary); }

  /* Table */
  .table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead tr { border-bottom: 1px solid var(--border); background: var(--surface2); }
  th {
    padding: 10px 14px; text-align: left;
    font-size: 11px; font-weight: 500; text-transform: uppercase;
    letter-spacing: .05em; color: var(--text-secondary);
  }
  tbody tr.feature-row { cursor: pointer; border-bottom: 1px solid var(--border-light); transition: background .1s; }
  tbody tr.feature-row:last-of-type { border-bottom: none; }
  tbody tr.feature-row:hover td { background: var(--bg); }
  tbody tr.feature-row.expanded td { background: var(--surface2); }
  td { padding: 12px 14px; vertical-align: middle; }
  .feature-name { font-weight: 500; color: var(--text-primary); font-size: 13px; }
  .jira-id { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--accent); }
  .assignee { font-size: 12px; color: var(--text-secondary); }
  .phase-label { font-size: 12px; color: var(--text-secondary); }

  /* Badges */
  .badge {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 11px; font-weight: 500;
    padding: 3px 9px; border-radius: 20px;
  }
  .badge::before { content: ''; width: 5px; height: 5px; border-radius: 50%; display: inline-block; }
  .b-done  { background: var(--green-bg); color: var(--green); }
  .b-done::before  { background: var(--green); }
  .b-prog  { background: var(--blue-bg); color: var(--blue); }
  .b-prog::before  { background: var(--blue); }
  .b-pend  { background: var(--gray-bg); color: var(--gray); }
  .b-pend::before  { background: var(--gray); }
  .b-delay { background: var(--amber-bg); color: var(--amber); }
  .b-delay::before { background: var(--amber); }

  /* Progress */
  .pct-wrap { display: flex; align-items: center; gap: 8px; }
  .pbar { width: 72px; height: 4px; background: var(--border); border-radius: 4px; overflow: hidden; }
  .pbar-fill { height: 100%; border-radius: 4px; }
  .pf-done { background: var(--green); }
  .pf-prog { background: var(--blue); }
  .pf-pend { background: #C2BFB8; }
  .pct-text { font-size: 12px; color: var(--text-secondary); font-variant-numeric: tabular-nums; min-width: 30px; }

  /* Expand arrow */
  .expand-arrow { color: var(--text-tertiary); transition: transform .2s; font-size: 10px; }
  .expanded .expand-arrow { transform: rotate(90deg); }

  /* Detail row */
  tr.detail-row td { padding: 0; border-bottom: 1px solid var(--border); background: var(--bg); }
  .detail-inner { padding: 16px 18px 18px; }
  .detail-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; color: var(--text-secondary); margin-bottom: 12px; }
  .phase-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; }
  .phase-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 12px;
    border-left-width: 3px;
  }
  .pc-done  { border-left-color: var(--green); }
  .pc-prog  { border-left-color: var(--blue); }
  .pc-pend  { border-left-color: #C2BFB8; }
  .pc-delay { border-left-color: var(--amber); }
  .pc-name  { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; color: var(--text-secondary); margin-bottom: 5px; }
  .pc-actual { font-size: 12px; font-weight: 500; color: var(--text-primary); }
  .pc-planned { font-size: 10px; color: var(--text-tertiary); margin-top: 3px; }
  .pc-done-text  { color: var(--green); }
  .pc-prog-text  { color: var(--blue); }
  .pc-delay-text { color: var(--amber); }

  /* Loading / error */
  .state-screen {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 300px; gap: 12px;
  }
  .spinner {
    width: 28px; height: 28px;
    border: 2.5px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .state-msg { font-size: 13px; color: var(--text-secondary); }
  .error-box {
    background: #FEF2F2; border: 1px solid #FECACA; border-radius: var(--radius);
    padding: 16px 20px; font-size: 13px; color: #991B1B; max-width: 480px; text-align: center;
  }
  .retry-btn {
    margin-top: 10px; font-size: 12px; font-family: 'Inter', sans-serif;
    background: #991B1B; color: #fff; border: none; border-radius: var(--radius-sm);
    padding: 7px 16px; cursor: pointer;
  }

  /* Prod date */
  .prod-date { font-size: 12px; }
  .pd-done   { color: var(--green); font-weight: 500; }
  .pd-due    { color: var(--text-secondary); }
  .pd-delay  { color: var(--amber); font-weight: 500; }

  @media (max-width: 900px) {
    .main { padding: 20px 16px; }
    .metrics { grid-template-columns: repeat(2,1fr); }
    .phase-grid { grid-template-columns: repeat(3,1fr); }
    th:nth-child(2), td:nth-child(2),
    th:nth-child(3), td:nth-child(3) { display: none; }
  }
</style>
</head>
<body>

<header class="header">
  <div class="header-left">
    <div class="logo">
      <svg viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="1" y="1" width="7" height="7" rx="1.5" fill="white" opacity=".9"/>
        <rect x="10" y="1" width="7" height="7" rx="1.5" fill="white" opacity=".5"/>
        <rect x="1" y="10" width="7" height="7" rx="1.5" fill="white" opacity=".5"/>
        <rect x="10" y="10" width="7" height="7" rx="1.5" fill="white" opacity=".2"/>
      </svg>
    </div>
    <div>
      <div class="header-title">Feature Delivery Dashboard</div>
      <div class="header-sub">Intellect Design Arena — live from Google Sheets</div>
    </div>
  </div>
  <div class="header-right">
    <span class="last-updated" id="last-updated">—</span>
    <button class="refresh-btn" onclick="loadData()">
      <svg viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M12.5 7A5.5 5.5 0 1 1 7 1.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        <path d="M7 1.5L9.5 4M7 1.5L9.5 0" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Refresh
    </button>
  </div>
</header>

<main class="main">
  <div id="app">
    <div class="state-screen"><div class="spinner"></div><div class="state-msg">Loading data from Google Sheets…</div></div>
  </div>
</main>

<script>
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS1HcNysJLlm3dhkuc_o-FOxr8xRH1hxyOay4jzn21EvXZXqISNbJ8n4mqHQJyVqA/pub?gid=406038280&single=true&output=csv';
const PROXY_URL = 'https://corsproxy.io/?' + encodeURIComponent(CSV_URL);
const PHASES = ['Grooming','Design','Build','QA','Jio UAT','Jio Prod'];
const TODAY = new Date(); TODAY.setHours(0,0,0,0);

let features = [];
let activeFilter = 'all';
let openFeature = null;

/* ── CSV parser ── */
function parseCSV(text) {
  const rows = [];
  const lines = text.split('\n');
  for (const line of lines) {
    const row = [];
    let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c === '"') { inQ = !inQ; }
      else if (c === ',' && !inQ) { row.push(cur.trim()); cur = ''; }
      else cur += c;
    }
    row.push(cur.trim());
    rows.push(row);
  }
  return rows;
}

/* ── Parse the sheet structure ──
   Row 0: section headers (col 0-1 = labels, col 2 = Planned, col 3 = Actual, col 4+ = features)
   Row 1: Feature names (col 4+)
   Row 2: Jira IDs (col 4+)
   Row 3: Assignees line 1 (col 4+)
   Row 4: Assignees line 2 (col 4+)
   Rows 5-10: Phase rows — col 0=phase name, col 2=planned date, col 4+ = actual/status per feature
*/
function parseFeatures(rows) {
  // Find the row that contains feature names (non-empty cells starting from col 4)
  // and rows for each phase
  const feats = [];

  // Detect header row: first row where col 4+ has meaningful text
  let nameRow = -1, jiraRow = -1, assigneeRow1 = -1, assigneeRow2 = -1;
  const phaseRows = {}; // phase name -> row index

  for (let r = 0; r < rows.length; r++) {
    const row = rows[r];
    const col0 = (row[0] || '').trim().toLowerCase();
    const col1 = (row[1] || '').trim().toLowerCase();

    if (col0 === '' && col1 === '' && nameRow === -1) {
      // Check if col 4+ has feature-like names
      const hasFeatures = rows[r].slice(4).some(v => v && v.trim() && !v.includes('Planned') && !v.includes('Actual'));
      if (hasFeatures) { nameRow = r; continue; }
    }
    if (nameRow !== -1 && jiraRow === -1) {
      const hasJira = rows[r].slice(4).some(v => v && /MAP-\d+/i.test(v));
      if (hasJira) { jiraRow = r; continue; }
    }
    if (jiraRow !== -1 && assigneeRow1 === -1) {
      assigneeRow1 = r; continue;
    }
    if (assigneeRow1 !== -1 && assigneeRow2 === -1) {
      assigneeRow2 = r; continue;
    }

    // Phase rows
    const phaseMatch = PHASES.find(p => col0.toLowerCase().includes(p.toLowerCase()) || col1.toLowerCase().includes(p.toLowerCase()));
    if (phaseMatch && !phaseRows[phaseMatch]) {
      phaseRows[phaseMatch] = r;
    }
  }

  // Fallback: use known row indices from the original file structure
  if (nameRow === -1) nameRow = 2;
  if (jiraRow  === -1) jiraRow  = 3;
  if (assigneeRow1 === -1) assigneeRow1 = 4;
  if (assigneeRow2 === -1) assigneeRow2 = 5;
  if (Object.keys(phaseRows).length === 0) {
    PHASES.forEach((p, i) => { phaseRows[p] = 6 + i; });
  }

  // Determine planned dates per phase from col 2
  const phasePlanned = {};
  PHASES.forEach(p => {
    if (phaseRows[p] !== undefined) {
      phasePlanned[p] = (rows[phaseRows[p]] && rows[phaseRows[p]][2]) ? rows[phaseRows[p]][2].trim() : null;
    }
  });

  // Feature columns: col 4 onwards, skip empty header cells
  const nameRowData = rows[nameRow] || [];
  for (let col = 4; col < nameRowData.length; col++) {
    const name = (nameRowData[col] || '').trim();
    if (!name || name === '' || name.toLowerCase() === 'nan') continue;

    const jira = jiraRow !== -1 ? ((rows[jiraRow] && rows[jiraRow][col]) || '').trim() : '';
    const a1   = assigneeRow1 !== -1 ? ((rows[assigneeRow1] && rows[assigneeRow1][col]) || '').trim() : '';
    const a2   = assigneeRow2 !== -1 ? ((rows[assigneeRow2] && rows[assigneeRow2][col]) || '').trim() : '';
    const assignee = [a1, a2].filter(Boolean).join(', ');

    const phases = {};
    PHASES.forEach(p => {
      const rIdx = phaseRows[p];
      const actual = (rIdx !== undefined && rows[rIdx] && rows[rIdx][col]) ? rows[rIdx][col].trim() : null;
      phases[p] = { actual: actual || null, planned: phasePlanned[p] || null };
    });

    feats.push({ name, jira, assignee, phases });
  }
  return feats;
}

/* ── Date helpers ── */
function parseDate(v) {
  if (!v) return null;
  const clean = v.replace(/\s*\(.*?\)/g, '').trim();
  if (/done/i.test(clean)) return new Date(TODAY); // treat "Done" as completed
  const d = new Date(clean);
  if (!isNaN(d)) return d;
  // Try DD-MMM or MMM-DD patterns
  const months = {jan:0,feb:1,mar:2,apr:3,may:4,jun:5,jul:6,aug:7,sep:8,oct:9,nov:10,dec:11};
  const m = clean.match(/(\d{1,2})[- ]([a-z]{3})/i) || clean.match(/([a-z]{3})[- ](\d{1,2})/i);
  if (m) {
    const day = parseInt(m[1]) || parseInt(m[2]);
    const mon = months[(m[2] || m[1]).toLowerCase().slice(0,3)];
    if (!isNaN(day) && mon !== undefined) return new Date(TODAY.getFullYear(), mon, day);
  }
  return null;
}

function fmtDate(v) {
  if (!v) return null;
  if (/done/i.test(v)) return { text: 'Done', cls: 'pc-done-text' };
  if (/poc/i.test(v)) return { text: v, cls: '' };
  const pct = v.match(/(\d+)%/);
  if (pct) return { text: v.replace(/\(.*?\)/, '').trim() + ` <span style="color:var(--amber)">(${pct[1]}%)</span>`, cls: 'pc-delay-text' };
  const d = parseDate(v);
  if (d) return { text: d.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}), cls: '' };
  return { text: v, cls: '' };
}

function phaseStatus(actual) {
  if (!actual) return 'pending';
  const d = parseDate(actual);
  if (!d) return d && /done/i.test(actual) ? 'done' : 'pending';
  if (/done/i.test(actual)) return 'done';
  if (actual.includes('%')) return 'inprog';
  return d <= TODAY ? 'done' : 'upcoming';
}

function featurePct(f) {
  const statuses = PHASES.map(p => phaseStatus(f.phases[p] && f.phases[p].actual));
  const done = statuses.filter(s => s === 'done').length;
  return Math.round((done / PHASES.length) * 100);
}

function featureStatus(f) {
  const pct = featurePct(f);
  if (pct === 100) return 'Completed';
  if (pct === 0) return 'Pending';
  return 'In Progress';
}

function currentPhase(f) {
  for (let i = PHASES.length - 1; i >= 0; i--) {
    if (phaseStatus(f.phases[PHASES[i]] && f.phases[PHASES[i]].actual) === 'done') {
      return i === PHASES.length - 1 ? PHASES[i] : PHASES[i + 1];
    }
  }
  return PHASES[0];
}

function isDelayed(f) {
  for (const p of PHASES) {
    const ph = f.phases[p];
    if (!ph) continue;
    const st = phaseStatus(ph.actual);
    if (st === 'done' && ph.planned) {
      const actual = parseDate(ph.actual), planned = parseDate(ph.planned);
      if (actual && planned && actual > planned) return true;
    }
  }
  return false;
}

/* ── Render ── */
function render() {
  const app = document.getElementById('app');
  const filtered = features.filter(f => activeFilter === 'all' || featureStatus(f) === activeFilter);

  const total = features.length;
  const done  = features.filter(f => featureStatus(f) === 'Completed').length;
  const prog  = features.filter(f => featureStatus(f) === 'In Progress').length;
  const pend  = features.filter(f => featureStatus(f) === 'Pending').length;

  const metricActive = (id) => activeFilter === id ? 'active' : '';

  app.innerHTML = `
    <div class="metrics">
      <div class="metric-card ${metricActive('all')}" onclick="setFilter('all')">
        <div class="metric-label">Total features</div>
        <div class="metric-value v-total">${total}</div>
        <div class="metric-desc">all tracked items</div>
      </div>
      <div class="metric-card ${metricActive('Completed')}" onclick="setFilter('Completed')">
        <div class="metric-label">Completed</div>
        <div class="metric-value v-done">${done}</div>
        <div class="metric-desc">all phases delivered</div>
      </div>
      <div class="metric-card ${metricActive('In Progress')}" onclick="setFilter('In Progress')">
        <div class="metric-label">In progress</div>
        <div class="metric-value v-prog">${prog}</div>
        <div class="metric-desc">active delivery</div>
      </div>
      <div class="metric-card ${metricActive('Pending')}" onclick="setFilter('Pending')">
        <div class="metric-label">Pending</div>
        <div class="metric-value v-pend">${pend}</div>
        <div class="metric-desc">not yet started</div>
      </div>
    </div>

    <div class="controls">
      <div class="filters">
        <button class="filter-btn ${activeFilter==='all'?'active':''}" onclick="setFilter('all')">All</button>
        <button class="filter-btn ${activeFilter==='Completed'?'active':''}" onclick="setFilter('Completed')">Completed</button>
        <button class="filter-btn ${activeFilter==='In Progress'?'active':''}" onclick="setFilter('In Progress')">In progress</button>
        <button class="filter-btn ${activeFilter==='Pending'?'active':''}" onclick="setFilter('Pending')">Pending</button>
      </div>
      <span class="feature-count">${filtered.length} feature${filtered.length !== 1 ? 's' : ''}</span>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Feature</th>
            <th>Jira ID</th>
            <th>Assignee</th>
            <th>Current phase</th>
            <th>Status</th>
            <th>Progress</th>
            <th>Target prod</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="tbody">
          ${filtered.map(f => featureRow(f)).join('')}
        </tbody>
      </table>
    </div>
  `;
}

function featureRow(f) {
  const pct = featurePct(f);
  const status = featureStatus(f);
  const phase = currentPhase(f);
  const delayed = isDelayed(f);
  const isOpen = openFeature === f.name;

  const badgeCls = status === 'Completed' ? 'b-done' : status === 'In Progress' ? (delayed ? 'b-delay' : 'b-prog') : 'b-pend';
  const badgeLabel = status === 'In Progress' && delayed ? 'Delayed' : status;
  const barCls = status === 'Completed' ? 'pf-done' : status === 'In Progress' ? 'pf-prog' : 'pf-pend';

  const prodPhase = f.phases['Jio Prod'];
  let prodHtml = '—';
  if (prodPhase) {
    if (prodPhase.actual && phaseStatus(prodPhase.actual) === 'done') {
      const fd = fmtDate(prodPhase.actual);
      prodHtml = `<span class="prod-date pd-done">${fd ? fd.text : prodPhase.actual}</span>`;
    } else if (prodPhase.planned) {
      const d = parseDate(prodPhase.planned);
      const label = d ? d.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}) : prodPhase.planned;
      const cls = d && d < TODAY ? 'pd-delay' : 'pd-due';
      prodHtml = `<span class="prod-date ${cls}">${label}</span>`;
    }
  }

  const detailHtml = isOpen ? `
    <tr class="detail-row" data-detail="${f.name}">
      <td colspan="8">
        <div class="detail-inner">
          <div class="detail-title">Phase breakdown — ${f.name}</div>
          <div class="phase-grid">
            ${PHASES.map(p => phaseCard(f, p)).join('')}
          </div>
        </div>
      </td>
    </tr>` : '';

  return `
    <tr class="feature-row ${isOpen ? 'expanded' : ''}" onclick="toggleDetail('${f.name.replace(/'/g,"\\'")}')">
      <td><div class="feature-name">${f.name}</div></td>
      <td><span class="jira-id">${f.jira || '—'}</span></td>
      <td><span class="assignee">${f.assignee || '—'}</span></td>
      <td><span class="phase-label">${phase}</span></td>
      <td><span class="badge ${badgeCls}">${badgeLabel}</span></td>
      <td>
        <div class="pct-wrap">
          <div class="pbar"><div class="pbar-fill ${barCls}" style="width:${pct}%"></div></div>
          <span class="pct-text">${pct}%</span>
        </div>
      </td>
      <td>${prodHtml}</td>
      <td><span class="expand-arrow">▶</span></td>
    </tr>
    ${detailHtml}
  `;
}

function phaseCard(f, p) {
  const ph = f.phases[p];
  const st = phaseStatus(ph && ph.actual);
  const cls = st === 'done' ? 'pc-done' : ph && ph.actual && ph.actual.includes('%') ? 'pc-delay' : st === 'inprog' ? 'pc-prog' : 'pc-pend';
  const fd = ph && ph.actual ? fmtDate(ph.actual) : null;
  const actualHtml = fd
    ? `<div class="pc-actual ${fd.cls}">${fd.text}</div>`
    : `<div class="pc-actual" style="color:var(--text-tertiary)">—</div>`;
  const plannedLabel = ph && ph.planned ? (() => { const d = parseDate(ph.planned); return d ? d.toLocaleDateString('en-GB',{day:'numeric',month:'short'}) : ph.planned; })() : '—';

  return `
    <div class="phase-card ${cls}">
      <div class="pc-name">${p}</div>
      ${actualHtml}
      <div class="pc-planned">Planned: ${plannedLabel}</div>
    </div>`;
}

function setFilter(f) {
  activeFilter = f;
  openFeature = null;
  render();
}

function toggleDetail(name) {
  openFeature = openFeature === name ? null : name;
  render();
}

/* ── Data loading ── */
async function loadData() {
  document.getElementById('last-updated').textContent = 'Loading…';
  try {
    let resp = await fetch(PROXY_URL).catch(() => null);
    if (!resp || !resp.ok) resp = await fetch(CSV_URL + '&cachebust=' + Date.now());
    if (!resp || !resp.ok) throw new Error('HTTP ' + (resp ? resp.status : 'network error'));
    const text = await resp.text();
    const rows = parseCSV(text);
    features = parseFeatures(rows);
    if (features.length === 0) throw new Error('No features found in sheet. Check sheet structure.');
    document.getElementById('last-updated').textContent = 'Updated ' + new Date().toLocaleTimeString();
    render();
  } catch (e) {
    document.getElementById('last-updated').textContent = 'Error';
    document.getElementById('app').innerHTML = `
      <div class="state-screen">
        <div class="error-box">
          <strong>Could not load data</strong><br><br>
          ${e.message}<br><br>
          Make sure your Google Sheet is published via <em>File → Share → Publish to web</em>.
          <br><button class="retry-btn" onclick="loadData()">Retry</button>
        </div>
      </div>`;
  }
}

loadData();
// Auto-refresh every 5 minutes
setInterval(loadData, 5 * 60 * 1000);
</script>
</body>
</html>
